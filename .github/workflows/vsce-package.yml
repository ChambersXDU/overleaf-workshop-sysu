name: Package VSIX

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: |
          npm install
          cd views/chat-view && npm install

      - name: Compile
        run: npm run compile

      - name: Package VSIX
        run: |
          npx --yes @vscode/vsce package --no-rewrite-relative-links
          ls -lh *.vsix
          echo "VSIX_FILE=$(ls -1 *.vsix | head -n1)" >> "$GITHUB_ENV"
          echo "VERSION=$(node -p "require('./package.json').version")" >> "$GITHUB_ENV"

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: overleaf-workshop-sysu
          path: "*.vsix"
          if-no-files-found: error

      # PR 只打包；push 到主分支时同步发到 Releases（方便下载）
      - name: Publish GitHub Release
        if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: v${{ env.VERSION }}
          files: "*.vsix"
          generate_release_notes: true
          make_latest: true
          # 同一版本再次 push 时更新该 Release 的附件
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
